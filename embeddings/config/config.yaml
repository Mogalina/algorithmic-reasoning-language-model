embedding:
  # HuggingFace model for the transcript summary embedding model
  model_id: "google/embeddinggemma-300m"
  # Local directory where the model will be cached after download
  local_model_dir: "./models/embeddinggemma-300m"
  # Number of texts to embed in a single forward pass
  batch_size: 8

database:
  faiss:
    # Directory where the index is stored
    path: "./data/faiss_index"
    # Maximum allowed size of the index on disk
    max_size_gb: 10
  
  sqlite:
    # Directory where the metadata is stored
    path: "./data/metadata.db"
    # Maximum allowed size of the database on disk
    max_size_gb: 100

logging:
  # Path to the log file relative to project root
  log_file: "./logs/app.log"
  # Maximum circular log file size before rotation
  rotation: "100 MB"
  # How long to keep rotated log archives
  retention: "30 days"
  # Minimum log level to record
  level: "INFO"
